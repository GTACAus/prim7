<!doctype html>
<html lang="en"><head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Needs Game</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-5px)}
      40%{transform:translateX(5px)}
      60%{transform:translateX(-3px)}
      80%{transform:translateX(3px)}
    }
    .shake{animation:shake 0.35s ease}
    @keyframes fadeOut{0%{opacity:1}100%{opacity:0}}
    .fade-out{animation:fadeOut 0.8s ease forwards}
    .control-btn{
      width:60px;height:60px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      font-size:26px;font-weight:700;cursor:pointer;border:none;
      transition:transform 0.1s;
    }
    .control-btn:active{transform:scale(0.9)}
    .control-btn:focus-visible{outline:3px solid #000;outline-offset:2px}
    .scenario-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen flex flex-col items-center justify-center p-4" style="background: linear-gradient(90deg, rgb(224, 247, 250), rgb(255, 249, 196));">
  <header class="text-center mb-3">
   <h1 data-template-id="game-title" class="canva-text font-bold" style="color: rgb(46, 125, 50); font-weight: 700; font-style: normal; font-size: 32px;">🌱 Plant Needs Game</h1>
   <p id="score-display" class="text-sm font-medium mt-1 text-green-700"></p>
  </header>
  <main id="game-area" class="w-full max-w-3xl">
   <p data-template-id="prompt-text" class="canva-text text-center mb-3 font-medium" style="color: rgb(78, 52, 46); font-weight: 400; font-style: normal; font-size: 20px;">What does this plant need?</p>
   <p id="hint-text" class="text-center text-base mb-4 text-amber-800 font-medium"></p>
   <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-5"><!-- Left: scenario plant images stacked -->
    <div class="relative w-48 h-48 sm:w-56 sm:h-56 rounded-2xl overflow-hidden border-4 border-amber-300 bg-amber-50 flex items-center justify-center" id="left-frame"><img data-template-id="plant-s1" class="canva-image scenario-img hidden" loading="lazy" src="https://images.pexels.com/photos/10651660/pexels-photo-10651660.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="A wilted plant that needs more water"> <img data-template-id="plant-s2" class="canva-image scenario-img hidden" loading="lazy" src="https://images.pexels.com/photos/4503276/pexels-photo-4503276.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="An overwatered plant with yellow soggy leaves"> <img data-template-id="plant-s3" class="canva-image scenario-img hidden" loading="lazy" src="https://images.pexels.com/photos/18286956/pexels-photo-18286956.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="A pale plant stretching toward light needing more sunlight"> <img data-template-id="plant-s4" class="canva-image scenario-img hidden" loading="lazy" src="https://images.pexels.com/photos/1145033/pexels-photo-1145033.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="A plant with scorched brown leaves from too much sun"> <img data-template-id="plant-s5" class="canva-image scenario-img hidden" loading="lazy" src="https://images.pexels.com/photos/7208482/pexels-photo-7208482.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="A small stunted plant growing slowly needing more CO2"> <img data-template-id="plant-s6" class="canva-image scenario-img hidden" loading="lazy" src="https://images.pexels.com/photos/27810913/pexels-photo-27810913.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="A plant with curling leaves needing less carbon dioxide"> <img data-template-id="plant-s7" class="canva-image scenario-img hidden" loading="lazy" src="https://images.pexels.com/photos/19248484/pexels-photo-19248484.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="A plant with yellow leaves showing nutrient deficiency"> <img data-template-id="plant-s8" class="canva-image scenario-img hidden" loading="lazy" src="https://images.pexels.com/photos/30201181/pexels-photo-30201181.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="A plant with brown burnt leaf tips from too much fertilizer"> <img data-template-id="healthy-plant-overlay" class="canva-image scenario-img opacity-0" loading="lazy" id="healthy-overlay" src="https://images.pexels.com/photos/8988951/pexels-photo-8988951.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="Vibrant healthy green houseplant">
    </div>
    <div class="flex items-center"><i data-lucide="arrow-right" class="w-8 h-8 text-green-600 hidden sm:block"></i> <i data-lucide="arrow-down" class="w-8 h-8 text-green-600 sm:hidden"></i>
    </div>
    <div class="w-48 h-48 sm:w-56 sm:h-56 rounded-2xl overflow-hidden border-4 border-green-400 bg-green-50 flex items-center justify-center"><img data-template-id="healthy-plant" class="canva-image w-full h-full object-cover" loading="lazy" src="https://images.pexels.com/photos/8988951/pexels-photo-8988951.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800" alt="Vibrant healthy green houseplant goal">
    </div>
   </div>
   <div id="controls" class="grid grid-cols-2 sm:grid-cols-4 gap-4 max-w-xl mx-auto mb-4">
    <div class="flex flex-col items-center gap-2"><button class="control-btn bg-blue-400 text-white" aria-label="More Water" data-action="water-more">▲</button> <span data-template-id="label-water" class="canva-text font-medium text-sm" style="color: rgb(21, 101, 192); font-weight: 400; font-style: normal; font-size: 18px;">💧 Water</span> <button class="control-btn bg-blue-200 text-blue-800" aria-label="Less Water" data-action="water-less">▼</button>
    </div>
    <div class="flex flex-col items-center gap-2"><button class="control-btn bg-yellow-400 text-white" aria-label="More Sunlight" data-action="sunlight-more">▲</button> <span data-template-id="label-sunlight" class="canva-text font-medium text-sm" style="color: rgb(245, 127, 23); font-weight: 400; font-style: normal; font-size: 18px;">☀️ Sunlight</span> <button class="control-btn bg-yellow-200 text-yellow-800" aria-label="Less Sunlight" data-action="sunlight-less">▼</button>
    </div>
    <div class="flex flex-col items-center gap-2"><button class="control-btn bg-gray-500 text-white" aria-label="More Carbon Dioxide" data-action="co2-more">▲</button> <span data-template-id="label-co2" class="canva-text font-medium text-sm" style="color: rgb(69, 90, 100); font-weight: 400; font-style: normal; font-size: 18px;">🌬️ CO₂</span> <button class="control-btn bg-gray-200 text-gray-700" aria-label="Less Carbon Dioxide" data-action="co2-less">▼</button>
    </div>
    <div class="flex flex-col items-center gap-2"><button class="control-btn bg-orange-500 text-white" aria-label="More Nutrients" data-action="nutrients-more">▲</button> <span data-template-id="label-nutrients" class="canva-text font-medium text-sm" style="color: rgb(230, 81, 0); font-weight: 400; font-style: normal; font-size: 18px;">🧪 Nutrients</span> <button class="control-btn bg-orange-200 text-orange-800" aria-label="Less Nutrients" data-action="nutrients-less">▼</button>
    </div>
   </div>
   <div id="feedback" class="text-center min-h-[3rem] flex items-center justify-center">
    <p id="feedback-text" class="text-lg font-bold text-green-600 hidden"></p>
   </div>
  </main><!-- Completion screen -->
  <div id="complete-screen" class="hidden w-full max-w-md text-center">
   <p class="text-5xl mb-4">🎉</p>
   <h2 data-template-id="complete-title" class="canva-text font-bold mb-2" style="color: rgb(46, 125, 50); font-weight: 700; font-style: normal; font-size: 28px;">Well done! You helped all the plants! 🌿</h2>
   <p id="final-score" class="text-xl font-medium text-green-700 mb-6"></p><button id="replay-btn" data-template-id="replay-button" class="canva-button px-8 py-4 rounded-xl text-lg font-bold" style="background: rgb(67, 160, 71); color: rgb(255, 255, 255); font-weight: 700; font-style: normal; font-size: 18px;">🔄 Play Again</button>
  </div>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    lucide.createIcons();

    const scenarios = [
      { answer:'water-more', hint:'This plant is wilting — it looks thirsty!', imgId:'plant-s1' },
      { answer:'water-less', hint:'The leaves are turning yellow and soggy!', imgId:'plant-s2' },
      { answer:'sunlight-more', hint:'This plant is pale and stretching toward light!', imgId:'plant-s3' },
      { answer:'sunlight-less', hint:'The leaves look scorched and brown!', imgId:'plant-s4' },
      { answer:'co2-more', hint:'This plant is growing very slowly and looks stunted!', imgId:'plant-s5' },
      { answer:'co2-less', hint:'The leaves are curling up and closing!', imgId:'plant-s6' },
      { answer:'nutrients-more', hint:'The leaves are turning yellow at the edges!', imgId:'plant-s7' },
      { answer:'nutrients-less', hint:'The leaf tips are brown and burnt-looking!', imgId:'plant-s8' }
    ];

    let order, current, score, solved;
    const healthyOverlay = document.getElementById('healthy-overlay');
    const feedbackText = document.getElementById('feedback-text');
    const hintText = document.getElementById('hint-text');
    const controls = document.getElementById('controls');
    const gameArea = document.getElementById('game-area');
    const completeScreen = document.getElementById('complete-screen');
    const scoreDisplay = document.getElementById('score-display');
    const finalScore = document.getElementById('final-score');

    function shuffle(arr){
      for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
      }
      return arr;
    }

    function startGame(){
      order=shuffle([0,1,2,3,4,5,6,7]);
      current=0; score=0; solved=false;
      completeScreen.classList.add('hidden');
      gameArea.classList.remove('hidden');
      updateScore();
      loadScenario();
    }

    function updateScore(){
      scoreDisplay.textContent=`Question ${Math.min(current+1,8)} of 8 · Score: ${score}`;
    }

    function loadScenario(){
      solved=false;
      // Hide all scenario images
      document.querySelectorAll('.scenario-img').forEach(img=>{
        img.classList.add('hidden');
        img.classList.remove('fade-out');
        img.style.opacity='';
      });
      healthyOverlay.style.opacity='0';
      healthyOverlay.classList.remove('hidden');

      const s=scenarios[order[current]];
      const activeImg=document.querySelector(`[data-template-id="${s.imgId}"]`);
      activeImg.classList.remove('hidden');
      activeImg.style.opacity='1';

      hintText.textContent=s.hint;
      feedbackText.classList.add('hidden');
      updateScore();
    }

    controls.addEventListener('click',(e)=>{
      const btn=e.target.closest('[data-action]');
      if(!btn||solved)return;
      const s=scenarios[order[current]];
      if(btn.dataset.action===s.answer){
        solved=true;
        score++;
        const activeImg=document.querySelector(`[data-template-id="${s.imgId}"]`);
        activeImg.classList.add('fade-out');
        healthyOverlay.style.transition='opacity 0.8s';
        healthyOverlay.style.opacity='1';
        feedbackText.textContent='🌟 Correct! Great job!';
        feedbackText.classList.remove('hidden');
        updateScore();
        setTimeout(()=>{
          if(current<7){current++;loadScenario();}
          else{showComplete();}
        },1500);
      } else {
        btn.classList.add('shake');
        setTimeout(()=>btn.classList.remove('shake'),350);
      }
    });

    function showComplete(){
      gameArea.classList.add('hidden');
      completeScreen.classList.remove('hidden');
      finalScore.textContent=`You got ${score} out of 8 correct!`;
    }

    document.getElementById('replay-btn').addEventListener('click',startGame);
    startGame();
  </script>
