  <script src="/_sdk/719055fef2a85d14.editing_sdk.js" integrity="sha512-kFqrdGgIiTOsu307feB5Cy3JVP9IayftsmCIZ0csxYBGuBmJQPhyvcnmKR8F0fTW97h5s1gAvz3SumI8zJ6OxQ=="></script>
  <script>
    lucide.createIcons();

    const scenarios = [
      { answer:'water-more', hint:'This plant is wilting — it looks thirsty!', imgId:'plant-s1' },
      { answer:'water-less', hint:'The leaves are turning yellow and soggy!', imgId:'plant-s2' },
      { answer:'sunlight-more', hint:'This plant is pale and stretching toward light!', imgId:'plant-s3' },
      { answer:'sunlight-less', hint:'The leaves look scorched and brown!', imgId:'plant-s4' },
      { answer:'co2-more', hint:'This plant is growing very slowly and looks stunted!', imgId:'plant-s5' },
      { answer:'co2-less', hint:'The leaves are curling up and closing!', imgId:'plant-s6' },
      { answer:'nutrients-more', hint:'The leaves are turning yellow at the edges!', imgId:'plant-s7' },
      { answer:'nutrients-less', hint:'The leaf tips are brown and burnt-looking!', imgId:'plant-s8' }
    ];

    let order, current, score, solved;
    const healthyOverlay = document.getElementById('healthy-overlay');
    const feedbackText = document.getElementById('feedback-text');
    const hintText = document.getElementById('hint-text');
    const controls = document.getElementById('controls');
    const gameArea = document.getElementById('game-area');
    const completeScreen = document.getElementById('complete-screen');
    const scoreDisplay = document.getElementById('score-display');
    const finalScore = document.getElementById('final-score');

    function shuffle(arr){
      for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
      }
      return arr;
    }

    function startGame(){
      order=shuffle([0,1,2,3,4,5,6,7]);
      current=0; score=0; solved=false;
      completeScreen.classList.add('hidden');
      gameArea.classList.remove('hidden');
      updateScore();
      loadScenario();
    }

    function updateScore(){
      scoreDisplay.textContent=`Question ${Math.min(current+1,8)} of 8 · Score: ${score}`;
    }

    function loadScenario(){
      solved=false;
      document.querySelectorAll('.scenario-img').forEach(img=>{
        img.classList.add('hidden');
        img.classList.remove('fade-out');
        img.style.opacity='';
      });
      healthyOverlay.style.opacity='0';
      healthyOverlay.classList.remove('hidden');

      const s=scenarios[order[current]];
      const activeImg=document.querySelector(`[data-template-id="${s.imgId}"]`);
      activeImg.classList.remove('hidden');
      activeImg.style.opacity='1';

      hintText.textContent=s.hint;
      feedbackText.classList.add('hidden');
      updateScore();
    }

    controls.addEventListener('click',(e)=>{
      const btn=e.target.closest('[data-action]');
      if(!btn||solved)return;
      const s=scenarios[order[current]];
      if(btn.dataset.action===s.answer){
        solved=true;
        score++;
        const activeImg=document.querySelector(`[data-template-id="${s.imgId}"]`);
        activeImg.classList.add('fade-out');
        healthyOverlay.style.transition='opacity 0.8s';
        healthyOverlay.style.opacity='1';
        feedbackText.textContent='🌟 Correct! Great job!';
        feedbackText.classList.remove('hidden');
        updateScore();
        setTimeout(()=>{
          if(current<7){current++;loadScenario();}
          else{showComplete();}
        },1500);
      } else {
        btn.classList.add('shake');
        setTimeout(()=>btn.classList.remove('shake'),350);
      }
    });

    function showComplete(){
      gameArea.classList.add('hidden');
      completeScreen.classList.remove('hidden');
      finalScore.textContent=`You got ${score} out of 8 correct!`;
    }

    document.getElementById('replay-btn').addEventListener('click',startGame);
    startGame();
  </script>
