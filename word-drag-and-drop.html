            justify-content: center;
            min-width: 120px;
            height: 36px;
            border: 2px dashed #86efac;

        .word-chip:active { transform: scale(0.95); }

        @keyframes bounce-once {

 <body data-template-id="__page-root" class="w-full p-4 md:p-8" style="height: calc(100 * min(var(--vh, 1vh), 1vh)); overflow-y: auto; background: linear-gradient(135deg, rgb(236, 253, 245), rgb(209, 250, 229));">

  <script src="/_sdk/719055fef2a85d14.editing_sdk.js" integrity="sha512-kFqrdGgIiTOsu307feB5Cy3JVP9IayftsmCIZ0csxYBGuBmJQPhyvcnmKR8F0fTW97h5s1gAvz3SumI8zJ6OxQ=="></script>
  <script>
        const sentences = [
            { text: "Plants make sugar to get energy to grow. This occurs in the leaves using {0}, {1}, and {2}.", answers: ["sunlight","carbon dioxide","water"], flexible: true },
            { text: "Roots grow through {0} and this helps to keep the plant anchored.", answers: ["soil"], flexible: false },
            { text: "{0} moves from soil to roots, travels up the stem, and evaporates from the leaves. This helps the plant stay upright.", answers: ["water"], flexible: false },
            { text: "{0} in the soil are dissolved in water and enter the roots to travel around the plant.", answers: ["nutrients"], flexible: false },
            { text: "{0} is found in pores in the soil and is needed to keep roots healthy. If plants are over-watered, they don't get enough oxygen.", answers: ["oxygen"], flexible: false }
        ];

        const allWords = [
  "sunlight",
  "carbon dioxide",
  "water",
  "soil",
  "nutrients",
  "oxygen"
];
        let placed = {}; // key: "sentIdx-slotIdx", value: word
        let draggedWord = null;
        let draggedFromSlot = null;

        function buildUI() {
            const container = document.getElementById('sentences');
            container.innerHTML = '';
            sentences.forEach((s, si) => {
                const card = document.createElement('div');
                card.className = 'sentence-card bg-white/80 backdrop-blur rounded-xl p-4 shadow-sm';
                let html = '';
                const parts = s.text.split(/\{(\d+)\}/);
                parts.forEach((part, pi) => {
                    if (pi % 2 === 1) {
                        const slotId = `${si}-${part}`;
                        html += `<span class="drop-zone" data-slot="${slotId}" ondrop="dropWord(event)" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ontouchstart="touchStart(event)" ontouchover="touchOver(event)" ontouchend="touchEnd(event)"></span>`;
                    } else {
                        html += part;
                    }
                });
                card.innerHTML = html;
                container.appendChild(card);
            });
            renderBank();
        }

        function renderBank() {
            const bank = document.getElementById('word-bank');
            bank.innerHTML = '';
            allWords.forEach((w) => {
                const chip = document.createElement('span');
                chip.className = 'word-chip';
                chip.textContent = w;
                chip.draggable = true;
                chip.dataset.word = w;
                chip.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', w); chip.classList.add('dragging'); });
                chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
                chip.addEventListener('touchstart', (e) => touchStartWord(e, w));
                chip.addEventListener('touchmove', touchMoveWord);
                chip.addEventListener('touchend', (e) => touchEndWord(e, chip));
                bank.appendChild(chip);
            });
        }

        function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

        function touchStartWord(e, word) {
            draggedWord = word;
            e.currentTarget.classList.add('dragging');
            showDragGhost(word, e.touches[0].clientX, e.touches[0].clientY);
        }

        function touchMoveWord(e) {
            e.preventDefault();
            const touch = e.touches[0];
            updateDragGhost(touch.clientX, touch.clientY);
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
            if (target && target.classList.contains('drop-zone')) {
                target.classList.add('drag-over');
            }
        }

        function touchEndWord(e, chip) {
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            
            // Remove dragging state from all elements
            document.querySelectorAll('.word-chip, .drop-zone').forEach(el => el.classList.remove('dragging'));
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
            hideDragGhost();
            
            if (target && target.classList.contains('drop-zone')) {
                // Simulate drop
                const word = draggedWord;
                const slot = target.dataset.slot;
                const [sentIdx, slotIdx] = slot.split('-').map(Number);
                const sentence = sentences[sentIdx];
                
                let isValid = false;
                if (sentence.flexible) {
  const isAllowedAnswer = sentence.answers
    .map(answer => answer.toLowerCase())
    .includes(word.toLowerCase());

  const isDuplicate = isWordAlreadyUsedInSentence(
    word,
    sentIdx,
    slot
  );

  isValid = isAllowedAnswer && !isDuplicate;
} else {
                    isValid = word.toLowerCase() === sentence.answers[slotIdx].toLowerCase();
                }
                
                if (!isValid) {
                    draggedWord = null;
                    return;
                }
                
                if (placed[slot]) {
                    delete placed[slot];
                }
                placed[slot] = word;
                renderSlots();
                renderBank();
            }
            draggedWord = null;
        }

        function touchStart(e) {
            e.currentTarget.classList.add('drag-over');
        }

        function touchOver(e) {
            e.currentTarget.classList.add('drag-over');
        }

        function touchEnd(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function isWordAlreadyUsedInSentence(word, sentenceIndex, ignoredSlot = null) {
  const normalisedWord = word.toLowerCase();

  return Object.entries(placed).some(([slot, placedWord]) => {
    const [placedSentenceIndex] = slot.split('-').map(Number);

    return (
      placedSentenceIndex === sentenceIndex &&
      slot !== ignoredSlot &&
      placedWord.toLowerCase() === normalisedWord
    );
  });
}

        function dropWord(e) {
            e.preventDefault();
            const zone = e.currentTarget;
            zone.classList.remove('drag-over');
            const word = e.dataTransfer.getData('text/plain');
            const slot = zone.dataset.slot;
            const [sentIdx, slotIdx] = slot.split('-').map(Number);
            const sentence = sentences[sentIdx];
            
            // Check if word is valid for this slot
            let isValid = false;
            if (sentence.flexible) {
  const isAllowedAnswer = sentence.answers
    .map(answer => answer.toLowerCase())
    .includes(word.toLowerCase());

  const isDuplicate = isWordAlreadyUsedInSentence(
    word,
    sentIdx,
    slot
  );

  isValid = isAllowedAnswer && !isDuplicate;
} else {
                // Strict: check exact slot match (case-insensitive)
                isValid = word.toLowerCase() === sentence.answers[slotIdx].toLowerCase();
            }
            
            // If word is not valid, reject the drop
            if (!isValid) {
                return;
            }
            
            // If slot already has a word, return it
            if (placed[slot]) {
                delete placed[slot];
            }
            placed[slot] = word;
            renderSlots();
            renderBank();
        }

        function renderSlots() {
            document.querySelectorAll('.drop-zone').forEach(zone => {
                const slot = zone.dataset.slot;
                zone.classList.remove('correct','incorrect');
                if (placed[slot]) {
                    zone.innerHTML = `<span class="placed-word" draggable="true" data-word="${placed[slot]}" data-slot="${slot}">${placed[slot]}</span>`;
                    const pw = zone.querySelector('.placed-word');
                    pw.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', placed[slot]); e.dataTransfer.setData('text/slot', slot); });
                    pw.addEventListener('dragend', (e) => {
                        if (!zone.contains(document.elementFromPoint(e.clientX, e.clientY))) {
                            delete placed[slot];
                            renderSlots();
                            renderBank();
                        }
                    });
                    pw.addEventListener('touchstart', (e) => touchStartPlaced(e, placed[slot], slot));
                    pw.addEventListener('touchmove', touchMovePlaced);
                    pw.addEventListener('touchend', (e) => touchEndPlaced(e, slot));
                } else {
                    zone.innerHTML = '';
                }
            });
            checkAllFilled();
        }

        function touchStartPlaced(e, word, slot) {
            draggedWord = word;
            draggedFromSlot = slot;
            e.currentTarget.classList.add('dragging');
            showDragGhost(word, e.touches[0].clientX, e.touches[0].clientY);
        }

        function touchMovePlaced(e) {
            e.preventDefault();
            const touch = e.touches[0];
            updateDragGhost(touch.clientX, touch.clientY);
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
            if (target && target.classList.contains('drop-zone')) {
                target.classList.add('drag-over');
            }
        }

        function touchEndPlaced(e, sourceSlot) {
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            
            document.querySelectorAll('.placed-word, .drop-zone').forEach(el => el.classList.remove('dragging'));
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
            hideDragGhost();
            
            if (target && target.classList.contains('drop-zone')) {
                const destSlot = target.dataset.slot;
                if (destSlot !== sourceSlot) {
                    const [sentIdx, slotIdx] = destSlot.split('-').map(Number);
                    const sentence = sentences[sentIdx];
                    
                    let isValid = false;
                    if (sentence.flexible) {
  const isAllowedAnswer = sentence.answers
    .map(answer => answer.toLowerCase())
    .includes(draggedWord.toLowerCase());

  const isDuplicate = isWordAlreadyUsedInSentence(
    draggedWord,
    sentIdx,
    sourceSlot
  );

  isValid = isAllowedAnswer && !isDuplicate;
} else {
                        isValid = draggedWord.toLowerCase() === sentence.answers[slotIdx].toLowerCase();
                    }
                    
                    if (isValid) {
                        if (placed[destSlot]) {
                            delete placed[destSlot];
                        }
                        delete placed[sourceSlot];
                        placed[destSlot] = draggedWord;
                        renderSlots();
                        renderBank();
                    }
                }
            }
            draggedWord = null;
            draggedFromSlot = null;
        }

        function checkAnswers() {
            let allCorrect = true;
            sentences.forEach((s, si) => {
                s.answers.forEach((_, ai) => {
                    const slot = `${si}-${ai}`;
                    const zone = document.querySelector(`[data-slot="${slot}"]`);
                    const word = placed[slot];
                    let correct = false;
                    if (s.flexible) {
                        correct = word && s.answers.map(a=>a.toLowerCase()).includes(word.toLowerCase());
                    } else {
                        correct = word && word.toLowerCase() === s.answers[ai].toLowerCase();
                    }
                    zone.classList.toggle('correct', correct);
                    zone.classList.toggle('incorrect', !correct);
                    if (!correct) allCorrect = false;
                });
            });
            // Check flexible: no duplicates
            const flexSlots = ['0-0','0-1','0-2'];
            const flexWords = flexSlots.map(s => (placed[s]||'').toLowerCase());
            if (new Set(flexWords).size !== 3 || flexWords.includes('')) {
                flexSlots.forEach(s => { document.querySelector(`[data-slot="${s}"]`).classList.add('incorrect'); document.querySelector(`[data-slot="${s}"]`).classList.remove('correct'); });
                allCorrect = false;
            }
            const msg = document.getElementById('result-msg');
            msg.classList.remove('hidden');
            msg.textContent = allCorrect ? '🌱 Perfect! All correct!' : 'Some answers need fixing. Try again!';
            msg.style.color = allCorrect ? '#16a34a' : '#dc2626';
        }

        function resetGame() {
            placed = {};
            document.getElementById('result-msg').classList.add('hidden');
            document.getElementById('celebration-msg').classList.add('hidden');
            hideDragGhost();
            renderSlots();
            renderBank();
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('correct','incorrect'));
        }

        function checkAllFilled() {
            const totalSlots = document.querySelectorAll('.drop-zone').length;
            const filledSlots = Object.keys(placed).length;
            if (filledSlots === totalSlots && totalSlots > 0) {
                const celebration = document.getElementById('celebration-msg');
                celebration.classList.remove('hidden', 'celebration-bounce');
                // Trigger reflow to restart animation
                void celebration.offsetWidth;
                celebration.classList.add('celebration-bounce');
            } else {
                document.getElementById('celebration-msg').classList.add('hidden');
            }
        }

        function showDragGhost(text, x, y) {
            const ghost = document.getElementById('drag-ghost');
            ghost.textContent = text;
            ghost.style.display = 'block';
            ghost.style.left = x + 'px';
            ghost.style.top = y + 'px';
        }

        function updateDragGhost(x, y) {
            const ghost = document.getElementById('drag-ghost');
            ghost.style.left = x + 'px';
            ghost.style.top = y + 'px';
        }

        function hideDragGhost() {
            const ghost = document.getElementById('drag-ghost');
            ghost.style.display = 'none';
        }

        buildUI();
    </script>
