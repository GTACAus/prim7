<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson 2 - Investigating Plants</title>

<style>

:root{
    --bg:#F9F6E7;
    --card:#fffdf5;
    --soft-green:#DFF4E8;
    --soft-blue:#E9F0FF;
    --text:#3f463f;
    --muted:#6d746d;
    --line:rgba(63,70,63,.18);

    --button:#00BC74;
    --button-hover:#009f63;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
}

.page{
    width:min(1100px,94%);
    margin:auto;
    padding:32px 0 60px;
}

.home-button{

    position:fixed;
    left:20px;
    top:20px;

    padding:12px 18px;

    border-radius:999px;

    background:white;

    text-decoration:none;

    color:var(--text);

    border:1px solid var(--line);

    box-shadow:0 6px 18px rgba(63,70,63,.12);

    font-weight:600;

}

.home-button:hover{

    background:var(--soft-blue);

}

.site-intro{

    margin-bottom:30px;

}

.site-intro h1{

    margin:0 0 8px;

    font-size:2rem;

}

.site-intro p{

    color:var(--muted);

}

.section{

    background:var(--card);

    border-radius:24px;

    border:1px solid var(--line);

    padding:22px;

    box-shadow:0 8px 24px rgba(63,70,63,.08);

}

.section-title{

    display:inline-block;

    padding:8px 14px;

    border-radius:999px;

    background:var(--soft-green);

    font-size:.95rem;

    font-weight:600;

    margin-bottom:18px;

}

.flashcard-box{

    background:var(--soft-blue);

    border:1px dashed var(--line);

    border-radius:20px;

    padding:12px;

}

.flashcard-frame{

    width:100%;

    height:700px;

    border:none;

    border-radius:16px;

    background:white;

}

.next-button{

    margin-top:20px;

    padding:12px 22px;

    border:none;

    border-radius:999px;

    background:var(--button);

    color:white;

    font-size:1rem;

    font-weight:600;

    cursor:pointer;

}

.next-button:hover{

    background:var(--button-hover);

}

</style>
<style>
.final-branch input {
  width: 100%;
  margin-bottom: 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 12px;
  background: #fffdf5;
  color: var(--text);
}

.final-input-row {
  display: flex;
  gap: 8px;
}

.final-input-row input {
  flex: 1;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 12px;
  background: #fffdf5;
  color: var(--text);
}

.final-input-row button {
  border: none;
  border-radius: 999px;
  padding: 10px 12px;
  background: var(--button);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.final-answer-list {
  list-style: none;
  padding-left: 0;
  margin: 12px 0 0;
}

.final-answer-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;

  background: #fffdf5;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 10px 8px 14px;
  margin-bottom: 8px;
}

@media (max-width: 800px) {
  .detective-embed-box {
    min-height: 900px;
  }
}

    @media (max-width: 800px) {
      .site-intro {
        padding-right: 0;
        padding-top: 58px;
      }

      .flashcard-iframe {
        height: 67rem;
    }

      .video-row,
      .plant-game,
      .learning-row {
        grid-template-columns: 1fr;
      }

      .label-bank {
        min-height: 160px;
      }

      .brainstorm-box {
        display: flex;
        flex-direction: column;
        min-height: auto;
      }

      .brainstorm-line {
        display: none;
      }

      .brainstorm-centre {
        order: -1;
        width: 100%;
        border-radius: 20px;
      }

      .brainstorm-item {
        max-width: 100%;
      }

      .thinglink-box {
        min-height: 520px;
      }
    }
  </style>
</head>

<body>

<a href="index.html" class="home-button">
🏠 Home
</a>

<main class="page">

<div class="site-intro">

<h1>Lesson 2</h1>

<p>Investigating plants</p>

</div>

<section class="section">

<h2 class="section-title">
Investigable or Non-investigable?
</h2>

<div class="flashcard-box">

<iframe
src="flash-cards.html"
class="flashcard-frame">
</iframe>

</div>

<button class="next-button">
Next
</button>

</section>

</main>

</body>

</html>
