<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Inquiry Lesson Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cream:#f9f6e7;--yellow:#ffcd1f;--orange:#ff6d3a;--mint:#6be7be;--purple:#4c34e5;--ink:#272a24;--page-text:18px;}
*{box-sizing:border-box}
body{margin:0;background:#fff;font-family:Figtree,Arial,sans-serif;color:var(--ink);}
.overview-wrap{width:100%;padding:24px 12px 40px;overflow:hidden;display:flex;justify-content:center;align-items:flex-start;}
.canvas{position:relative;width:1024px;height:983px;flex:0 0 1024px;background:#fff;overflow:hidden;transform-origin:top center;}
.pathway{position:absolute;inset:0;width:100%;height:100%;z-index:0;overflow:visible}
.hero{position:absolute;left:6%;top:5.4%;width:36.6%;height:16.8%;background:var(--yellow);border-radius:26px;display:flex;align-items:center;padding:0 3%;z-index:3;}
.hero:after{content:"";position:absolute;left:36%;bottom:-23%;border-left:31px solid transparent;border-right:31px solid transparent;border-top:38px solid var(--yellow);}
.hero h1{margin:0;color:#222e88;font-size:30px;line-height:1.18;font-weight:800;}
.hero img{position:absolute;right:1.5%;top:19%;width:28%;height:62%;object-fit:contain;}
.card{position:absolute;background:var(--cream);border:3px solid var(--ink);border-radius:27px;box-shadow:0 5px 0 rgba(39,42,36,.4);z-index:3;padding:16px 27px;display:grid;grid-template-columns:1fr 96px;align-items:center;text-decoration:none;color:inherit;cursor:pointer;transition:transform .22s ease,box-shadow .22s ease,filter .22s ease;}
.card:hover{transform:translateY(-4px);box-shadow:0 9px 0 rgba(39,42,36,.45);filter:brightness(1.08);}
.card:active{transform:translateY(-1px);}
.card:visited{color:inherit;}
.card:focus-visible{outline:5px solid var(--purple);outline-offset:5px;}
.card .copy{align-self:stretch;display:flex;flex-direction:column;justify-content:center;}
.lesson{color:var(--purple);font-weight:800;font-size:var(--page-text);line-height:1.3;margin-bottom:11px;}
.dash{width:74%;border-top:3px dashed var(--mint);margin-bottom:27px;}
.title{font-size:var(--page-text);font-weight:800;line-height:1.3;}
.card img{width:88px;height:88px;object-fit:contain;justify-self:end;}
.c1{left:6%;top:26.3%;width:40%;height:14.8%;}
.c2{left:54.8%;top:26.5%;width:40%;height:14.8%;}
.group{position:absolute;left:12.3%;top:50.6%;width:84.2%;height:19.4%;background:var(--yellow);border-radius:27px;z-index:2;padding:53px 14px 14px;}
.group-label{position:absolute;left:19px;top:12px;font-size:var(--page-text);line-height:1.3;font-weight:800;z-index:3;}
.group-flow{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;overflow:visible;}
.group .card{top:55px;height:121px;padding:13px 18px;grid-template-columns:1fr 80px;border-radius:25px;}
.group .lesson{font-size:var(--page-text);margin-bottom:8px;}
.group .dash{margin-bottom:20px;width:72%;}
.group .title{font-size:var(--page-text);}
.group .card img{width:78px;height:78px;}
.c3{left:15px;width:27.7%;}
.c4{left:35.8%;width:27.7%;}
.c5{right:15px;width:27.7%;}
.c6{left:12.3%;top:79.5%;width:44.8%;height:14.5%;grid-template-columns:1fr 95px;}
.c6 .dash{width:79%;margin-bottom:22px;}
@media(max-width:820px){.overview-wrap{padding:12px 8px 24px}}
</style>
</head>

<script>
(function(){
  const wrap=document.querySelector('.overview-wrap');
  const canvas=document.querySelector('.canvas');
  const DESIGN_W=1024, DESIGN_H=983;
  function fitCanvas(){
    const available=Math.max(280, wrap.clientWidth-24);
    const scale=Math.min(1, available/DESIGN_W);
    canvas.style.transform=`scale(${scale})`;
    wrap.style.height=(DESIGN_H*scale+48)+'px';
  }
  window.addEventListener('resize', fitCanvas, {passive:true});
  if('ResizeObserver' in window) new ResizeObserver(fitCanvas).observe(wrap);
  fitCanvas();
})();
</script>
