<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Explorer</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial, sans-serif;

    background:
        linear-gradient(rgba(0,0,0,.18), rgba(0,0,0,.18)),
        url("Growing Peashoot.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.home{
    min-height:100vh;
    position:relative;
}

/* ---------- Title ---------- */

.title{
    position:absolute;
    top:30px;
    left:30px;

    background:rgba(255,253,245,.92);

    padding:22px 26px;

    border-radius:24px;

    box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.title h1{
    margin:0 0 8px;
    color:#3f463f;
    font-size:2rem;
}

.title p{
    margin:0;
    color:#5f665f;
}

/* ---------- Lesson Cards ---------- */

.lesson-card{

    position:absolute;

    width:220px;

    background:rgba(255,253,245,.94);

    border-radius:24px;

    padding:18px;

    text-decoration:none;

    color:#3f463f;

    border:1px solid rgba(63,70,63,.15);

    box-shadow:0 12px 28px rgba(0,0,0,.22);

    transition:all .25s ease;
}

.lesson-card:hover{

    transform:translateY(-5px) scale(1.03);

    box-shadow:0 18px 40px rgba(0,0,0,.28);

}

.pill{

    display:inline-block;

    background:#DFF4E8;

    padding:6px 12px;

    border-radius:999px;

    font-size:.85rem;

    font-weight:bold;

    margin-bottom:10px;
}

.lesson-card h2{

    margin:0 0 8px;

    font-size:1.25rem;
}

.lesson-card p{

    margin:0;

    color:#666;

    line-height:1.45;

    font-size:.92rem;
}

/* ---------- Lesson Positions ---------- */

.lesson1{
    right:140px;
    bottom:120px;
}

.lesson2{
    left:170px;
    bottom:220px;
}

/*

    right:140px;

/* ---------- Mobile ---------- */

@media(max-width:800px){

.title{

    position:static;

    margin:20px;
}

.lesson-card{

    position:static;

    width:90%;

    margin:18px auto;
}

.home{

    padding-bottom:30px;
}

}

</style>

</head>

<body>

<main class="home">

<div class="title">

<h1>🌱 Plant Explorer</h1>

<p>Choose a lesson to begin your learning journey.</p>

</div>


<a href="lesson1.html" class="lesson-card lesson1">

<span class="pill">Lesson 1</span>

<h2>Plant Structures</h2>

<p>Learn about the different parts of a plant and what each part does.</p>

</a>


<a href="lesson2.html" class="lesson-card lesson2">

<span class="pill">Lesson 2</span>

<h2>Plant Needs</h2>

<p>Discover what plants need to survive and grow.</p>

</a>


</main>

</body>
</html>
